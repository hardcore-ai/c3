<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Escenario oscuro de orquestación de trabajo con nodos, líneas de ejecución y memoria">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.48" stop-color="#111409"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C8E600" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#C8E600" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#C8E600" stop-opacity="0"/>
