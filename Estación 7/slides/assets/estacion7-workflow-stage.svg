    <linearGradient id="orange" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#FF8C00" stop-opacity="0"/>
      <stop offset="0.58" stop-color="#FF8C00" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FF8C00" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
